name: Scorecard

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "45 3 * * 2"

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      # Required for uploading Scorecard SARIF to code scanning.
      security-events: write
      # Required for publishing signed Scorecard results to api.scorecard.dev.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: scorecard-results.sarif

  summary:
    name: Scorecard summary
    runs-on: ubuntu-latest
    needs: scorecard
    if: always()
    steps:
      - name: Write Scorecard summary
        env:
          SCORECARD_PROJECT: github.com/${{ github.repository }}
          SCORECARD_COMMIT: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.request

          project = os.environ["SCORECARD_PROJECT"]
          expected_commit = os.environ["SCORECARD_COMMIT"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          url = f"https://api.scorecard.dev/projects/{project}"

          data = None
          last_error = None
          for _ in range(12):
              try:
                  req = urllib.request.Request(url, headers={"Accept": "application/json"})
                  with urllib.request.urlopen(req, timeout=10) as response:
                      data = json.load(response)
                  if data.get("repo", {}).get("commit") == expected_commit:
                      break
              except Exception as exc:  # pragma: no cover - workflow diagnostics only
                  last_error = exc
              time.sleep(5)

          with open(summary_path, "a", encoding="utf-8") as out:
              out.write("## OpenSSF Scorecard\n\n")
              out.write(f"- Project: `{project}`\n")
              out.write(f"- Viewer: https://scorecard.dev/viewer/?uri={project}\n")
              if data is None:
                  out.write(f"- API result: unavailable (`{last_error}`)\n")
                  sys.exit(0)

              repo = data.get("repo", {})
              commit = repo.get("commit", "unknown")
              stale = "" if commit == expected_commit else " ⚠️ may not include this run yet"
              out.write(f"- Score: **{data.get('score', 'unknown')} / 10**\n")
              out.write(f"- Result date: `{data.get('date', 'unknown')}`\n")
              out.write(f"- Result commit: `{commit}`{stale}\n\n")
              out.write("| Check | Score | Reason |\n")
              out.write("| --- | ---: | --- |\n")
              checks = data.get("checks", [])
              checks.sort(key=lambda check: (check.get("score", -1) < 0, check.get("score", -1), check.get("name", "")))
              for check in checks:
                  name = check.get("name", "unknown")
                  score = check.get("score", "")
                  reason = str(check.get("reason", "")).replace("|", "\\|")
                  out.write(f"| {name} | {score} | {reason} |\n")

              warnings = []
              for check in checks:
                  for detail in check.get("details") or []:
                      if detail.startswith("Warn:"):
                          warnings.append((check.get("name", "unknown"), detail))
              if warnings:
                  out.write("\n### Warnings\n\n")
                  for name, detail in warnings:
                      out.write(f"- **{name}**: {detail}\n")
          PY
